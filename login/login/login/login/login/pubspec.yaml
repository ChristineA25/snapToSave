
name: login
description: Combined Flutter project with map search + ML + database + camera
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ---------------- Country / Region ----------------
  # Downgraded to avoid broken Freezed generation
  countries_utils: 1.0.1

  # ---------------- Dropdown ----------------
  # Downgraded because 7.x removed onChanged
  dropdown_search: 5.0.6

  # ---------------- Charts ----------------
  charts_flutter_updated: ^0.16.0
  fl_chart: ^1.2.0
  intl: ^0.19.0

  # ---------------- UI ----------------
  cupertino_icons: ^1.0.8

  # ---------------- Networking ----------------
  http: ^1.6.0
  connectivity_plus: ^6.0.5
  internet_connection_checker: ^3.0.1

  # ---------------- CSV ----------------
  csv: ^8.0.0

  # ---------------- MySQL ----------------
  mysql1: ^0.20.0

  # ---------------- Media Capture ----------------
  camera: ^0.12.0+1
  image_picker: ^1.2.1
  flutter_image_gallery_saver: ^2.0.0

  # ---------------- Storage & Paths ----------------
  sqflite: ^2.3.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # ---------------- Google ML Kit ----------------
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_object_detection: ^0.15.0
  google_mlkit_image_labeling: ^0.14.1

  # ---------------- Colors ----------------
  palette_generator: ^0.3.3

  # ---------------- Maps ----------------
  google_maps_flutter: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/homepage.png
    - assets/inputPage.png
    - assets/setting.png
    - assets/histNrecommend.png
    - assets/statistics.png
