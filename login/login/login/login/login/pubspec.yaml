name: login
description: Combined Flutter project with map search + ML + database + camera
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  countries_utils: ^1.0.0

  dropdown_search: ^6.0.1

  charts_flutter_updated: ^0.16.0
  fl_chart: ^0.70.2
  intl: ^0.19.0   # ← updated to satisfy charts_flutter_updated

  # ---------------- UI ----------------
  cupertino_icons: ^1.0.8

  # ---------------- Networking ----------------
  http: ^1.6.0
  connectivity_plus: ^6.0.5
  internet_connection_checker: ^1.0.0+1

  # ---------------- CSV ----------------
  csv: ^7.1.0

  # ---------------- MySQL ----------------
  mysql1: ^0.20.0

  # ---------------- Media Capture ----------------
  camera: ^0.11.0
  image_picker: ^1.2.1
  flutter_image_gallery_saver: ^1.1.3

  # ---------------- Storage & Paths ----------------
  sqflite: ^2.3.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # ---------------- Google ML Kit ----------------
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_object_detection: ^0.15.0
  google_mlkit_image_labeling: ^0.14.1

  # ---------------- Colors ----------------
  palette_generator: ^0.3.3

  # ---------------- MAP SEARCH ----------------
  google_maps_flutter: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets must be indented exactly 2 spaces under the 'flutter:' tag
  assets:
    - assets/homepage.png
    - assets/inputPage.png
    - assets/setting.png
    - assets/histNrecommend.png
    - assets/statistics.png